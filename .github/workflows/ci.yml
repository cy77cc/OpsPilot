name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  ai-contract-check:
    name: AI Contract Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: AI Contract Check
        run: go test ./internal/service/ai/handler -run RouteContract -v
