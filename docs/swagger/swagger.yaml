definitions:
  cluster.AddNodeReq:
    properties:
      host_ids:
        description: 主机 ID 列表 (必填)
        items:
          type: integer
        type: array
      role:
        description: '节点角色: worker/control-plane'
        type: string
    required:
    - host_ids
    type: object
  cluster.ClusterCreateReq:
    properties:
      auth_method:
        description: '认证方式: kubeconfig/certificate/token'
        type: string
      ca_cert:
        description: CA 证书
        type: string
      cert:
        description: 客户端证书
        type: string
      description:
        description: 集群描述
        type: string
      endpoint:
        description: API Server 地址
        type: string
      key:
        description: 客户端私钥
        type: string
      kubeconfig:
        description: Kubeconfig 内容
        type: string
      name:
        description: 集群名称 (必填)
        type: string
      skip_tls_verify:
        description: 是否跳过 TLS 验证
        type: boolean
      token:
        description: 认证 Token
        type: string
    required:
    - name
    type: object
  cluster.ClusterDetail:
    properties:
      created_at:
        description: 创建时间
        type: string
      credential_id:
        description: 凭证 ID
        type: integer
      description:
        description: 集群描述
        type: string
      endpoint:
        description: API Server 地址
        type: string
      id:
        description: 集群 ID
        type: integer
      k8s_version:
        description: Kubernetes 版本
        type: string
      last_sync_at:
        description: 最后同步时间
        type: string
      management_mode:
        description: 管理模式
        type: string
      name:
        description: 集群名称
        type: string
      node_count:
        description: 节点数量
        type: integer
      pod_cidr:
        description: Pod 网段
        type: string
      service_cidr:
        description: Service 网段
        type: string
      source:
        description: '来源: platform_managed/external_managed'
        type: string
      status:
        description: '集群状态: active/inactive/error'
        type: string
      type:
        description: '类型: kubernetes/openshift'
        type: string
      updated_at:
        description: 更新时间
        type: string
      version:
        description: 集群版本
        type: string
    type: object
  cluster.ClusterTestResp:
    properties:
      cluster_id:
        description: 集群 ID
        type: integer
      connected:
        description: 是否连通
        type: boolean
      last_error:
        description: 最后错误信息
        type: string
      latency_ms:
        description: 延迟 (毫秒)
        type: integer
      message:
        description: 连通消息
        type: string
      version:
        description: Kubernetes 版本
        type: string
    type: object
  cluster.ClusterUpdateReq:
    properties:
      description:
        description: 集群描述
        type: string
      name:
        description: 集群名称
        type: string
    type: object
  cluster.ClusterUpgradePlan:
    properties:
      current_version:
        description: 当前版本
        type: string
      steps:
        description: 升级步骤
        items:
          type: string
        type: array
      target_version:
        description: 目标版本
        type: string
      upgradable:
        description: 是否可升级
        type: boolean
      warnings:
        description: 警告信息
        items:
          type: string
        type: array
    type: object
  cluster.ClusterVersionInfo:
    properties:
      git_version:
        description: Git 版本
        type: string
      go_version:
        description: Go 版本
        type: string
      kubernetes_version:
        description: Kubernetes 版本
        type: string
      platform:
        description: 平台信息
        type: string
    type: object
  cluster.Condition:
    properties:
      last_transition_time:
        description: 最后转换时间
        type: string
      message:
        description: 条件消息
        type: string
      reason:
        description: 条件原因
        type: string
      status:
        description: 条件状态
        type: string
      type:
        description: 条件类型
        type: string
    type: object
  cluster.MapString:
    additionalProperties:
      type: string
    type: object
  cluster.NodeDetail:
    properties:
      allocatable_cpu:
        description: 可分配 CPU
        type: string
      allocatable_mem:
        description: 可分配内存
        type: string
      allocatable_pods:
        description: 可分配 Pod 数量
        type: integer
      cluster_id:
        description: 所属集群 ID
        type: integer
      conditions:
        description: 节点条件
        items:
          $ref: '#/definitions/cluster.Condition'
        type: array
      container_runtime:
        description: 容器运行时
        type: string
      created_at:
        description: 创建时间
        type: string
      host_id:
        description: 关联主机 ID
        type: integer
      host_name:
        description: 主机名称
        type: string
      id:
        description: 节点 ID
        type: integer
      ip:
        description: 节点 IP
        type: string
      joined_at:
        description: 加入时间
        type: string
      kernel_version:
        description: 内核版本
        type: string
      kube_proxy_version:
        description: Kube-proxy 版本
        type: string
      kubelet_version:
        description: Kubelet 版本
        type: string
      labels:
        allOf:
        - $ref: '#/definitions/cluster.MapString'
        description: 节点标签
      last_seen_at:
        description: 最后心跳时间
        type: string
      name:
        description: 节点名称
        type: string
      os_image:
        description: 操作系统镜像
        type: string
      role:
        description: 节点角色
        type: string
      status:
        description: 节点状态
        type: string
      taints:
        description: 节点污点
        items:
          $ref: '#/definitions/cluster.Taint'
        type: array
      updated_at:
        description: 更新时间
        type: string
    type: object
  cluster.Taint:
    properties:
      effect:
        description: '污点效果: NoSchedule/NoExecute/PreferNoSchedule'
        type: string
      key:
        description: 污点键
        type: string
      value:
        description: 污点值
        type: string
    type: object
  cluster.UpgradeClusterReq:
    properties:
      target_version:
        description: 目标版本 (必填)
        type: string
    required:
    - target_version
    type: object
  cluster.UpgradeClusterResult:
    properties:
      cluster_id:
        description: 集群 ID
        type: integer
      from_version:
        description: 原版本
        type: string
      message:
        description: 升级消息
        type: string
      status:
        description: 升级状态
        type: string
      to_version:
        description: 目标版本
        type: string
      upgrade_steps:
        description: 升级步骤
        items:
          type: string
        type: array
    type: object
  deployment.ClusterBootstrapPreviewReq:
    properties:
      cni:
        description: CNI 插件
        type: string
      control_plane_host_id:
        description: 控制平面主机 ID
        type: integer
      name:
        description: 集群名称
        type: string
      worker_host_ids:
        description: 工作节点 ID 列表
        items:
          type: integer
        type: array
    required:
    - control_plane_host_id
    - name
    type: object
  deployment.ClusterCredentialImportReq:
    properties:
      auth_method:
        description: 认证方式
        type: string
      ca_cert:
        description: CA 证书
        type: string
      cert:
        description: 客户端证书
        type: string
      endpoint:
        description: 集群端点
        type: string
      key:
        description: 客户端私钥
        type: string
      kubeconfig:
        description: kubeconfig 内容
        type: string
      name:
        description: 凭证名称
        type: string
      runtime_type:
        description: 运行时类型
        type: string
      source:
        description: '来源: external_managed'
        type: string
      token:
        description: Bearer Token
        type: string
    required:
    - name
    type: object
  deployment.EnvironmentBootstrapReq:
    properties:
      cluster_id:
        description: 集群 ID
        type: integer
      control_plane_host_id:
        description: 控制平面主机 ID
        type: integer
      env:
        description: 环境
        type: string
      name:
        description: 环境名称
        type: string
      node_ids:
        description: 节点 ID 列表
        items:
          type: integer
        type: array
      package_version:
        description: 安装包版本
        type: string
      runtime_type:
        description: '运行时类型: k8s/compose'
        type: string
      target_id:
        description: 目标 ID
        type: integer
      worker_host_ids:
        description: 工作节点 ID 列表
        items:
          type: integer
        type: array
    required:
    - name
    - package_version
    - runtime_type
    type: object
  deployment.GovernanceReq:
    properties:
      access_policy:
        additionalProperties: {}
        description: 访问策略
        type: object
      env:
        description: 环境
        type: string
      resilience_policy:
        additionalProperties: {}
        description: 弹性策略
        type: object
      slo_policy:
        additionalProperties: {}
        description: SLO 策略
        type: object
      traffic_policy:
        additionalProperties: {}
        description: 流量策略
        type: object
    type: object
  deployment.PlatformCredentialRegisterReq:
    properties:
      cluster_id:
        description: 集群 ID
        type: integer
      name:
        description: 凭证名称
        type: string
      runtime_type:
        description: 运行时类型
        type: string
    required:
    - cluster_id
    type: object
  deployment.ReleaseDecisionReq:
    properties:
      comment:
        description: 审批意见
        type: string
    type: object
  deployment.ReleasePreviewReq:
    properties:
      approval_token:
        description: 审批令牌 (向后兼容)
        type: string
      ci_run_id:
        description: CI 运行 ID
        type: integer
      env:
        description: 环境
        type: string
      preview_token:
        description: 预览令牌
        type: string
      service_id:
        description: 服务 ID
        type: integer
      strategy:
        description: 部署策略
        type: string
      target_id:
        description: 目标 ID
        type: integer
      trigger_context:
        additionalProperties: {}
        description: 触发上下文
        type: object
      trigger_source:
        description: '触发来源: manual/ci'
        type: string
      variables:
        additionalProperties:
          type: string
        description: 模板变量
        type: object
    required:
    - service_id
    - target_id
    type: object
  deployment.TargetNodeReq:
    properties:
      host_id:
        description: 主机 ID
        type: integer
      role:
        description: '角色: manager/worker'
        type: string
      weight:
        description: 权重
        type: integer
    type: object
  deployment.TargetUpsertReq:
    properties:
      bootstrap_job_id:
        description: 引导任务 ID
        type: string
      cluster_id:
        description: 集群 ID
        type: integer
      cluster_source:
        description: 集群来源
        type: string
      credential_id:
        description: 凭证 ID
        type: integer
      env:
        description: 环境
        type: string
      name:
        description: 目标名称
        type: string
      nodes:
        description: 节点列表
        items:
          $ref: '#/definitions/deployment.TargetNodeReq'
        type: array
      project_id:
        description: 项目 ID
        type: integer
      runtime_type:
        description: 运行时类型
        type: string
      target_type:
        description: '目标类型: k8s/compose'
        type: string
      team_id:
        description: 团队 ID
        type: integer
    required:
    - name
    - target_type
    type: object
  deployment.createPolicyReq:
    properties:
      config:
        additionalProperties: true
        description: 策略配置
        type: object
      enabled:
        description: 是否启用
        type: boolean
      name:
        description: 策略名称
        type: string
      target_id:
        description: 目标 ID
        type: integer
      type:
        description: 策略类型
        enum:
        - traffic
        - resilience
        - access
        - slo
        type: string
    required:
    - name
    - type
    type: object
  deployment.updatePolicyReq:
    properties:
      config:
        additionalProperties: true
        description: 策略配置
        type: object
      enabled:
        description: 是否启用
        type: boolean
      name:
        description: 策略名称
        type: string
      type:
        description: 策略类型
        type: string
    type: object
  handler.AlertmanagerAlert:
    properties:
      annotations:
        additionalProperties:
          type: string
        description: 注解
        type: object
      endsAt:
        description: 结束时间
        type: string
      fingerprint:
        description: 指纹
        type: string
      generatorURL:
        description: 生成器 URL
        type: string
      labels:
        additionalProperties:
          type: string
        description: 标签
        type: object
      startsAt:
        description: 触发时间
        type: string
      status:
        description: 状态 (firing/resolved)
        type: string
    type: object
  handler.AlertmanagerWebhook:
    properties:
      alerts:
        description: 告警列表
        items:
          $ref: '#/definitions/handler.AlertmanagerAlert'
        type: array
      commonAnnotations:
        additionalProperties:
          type: string
        description: 公共注解
        type: object
      commonLabels:
        additionalProperties:
          type: string
        description: 公共标签
        type: object
      externalURL:
        description: Alertmanager 外部 URL
        type: string
      groupLabels:
        additionalProperties:
          type: string
        description: 分组标签
        type: object
      receiver:
        description: 接收器名称
        type: string
      status:
        description: 整体状态 (firing/resolved)
        type: string
    type: object
  handler.rolloutApplyReq:
    properties:
      active_service:
        description: 活跃服务
        type: string
      approval_token:
        description: 审批票据
        type: string
      canary_steps:
        description: Canary 步骤
        items:
          additionalProperties: {}
          type: object
        type: array
      image:
        description: 镜像 (必填)
        type: string
      labels:
        additionalProperties:
          type: string
        description: 标签
        type: object
      name:
        description: 名称 (必填)
        type: string
      namespace:
        description: 命名空间 (必填)
        type: string
      preview_service:
        description: 预览服务
        type: string
      replicas:
        description: 副本数
        type: integer
      strategy:
        description: '策略: rolling/canary/blue-green'
        type: string
    required:
    - image
    - name
    - namespace
    type: object
  httpx.Response:
    properties:
      code:
        allOf:
        - $ref: '#/definitions/xcode.Xcode'
        description: 业务错误码
      data:
        description: 响应数据
      msg:
        description: 错误消息
        type: string
    type: object
  logic.CloudAccountReq:
    properties:
      access_key_id:
        type: string
      access_key_secret:
        type: string
      account_name:
        type: string
      provider:
        type: string
      region_default:
        type: string
    type: object
  logic.CloudImportReq:
    properties:
      account_id:
        type: integer
      instances:
        items:
          $ref: '#/definitions/logic.CloudInstanceInfo'
        type: array
      labels:
        items:
          type: string
        type: array
      provider:
        type: string
      role:
        type: string
    type: object
  logic.CloudInstanceInfo:
    properties:
      cpu:
        type: integer
      disk_gb:
        type: integer
      instance_id:
        type: string
      ip:
        type: string
      memory_mb:
        type: integer
      name:
        type: string
      os:
        type: string
      region:
        type: string
      status:
        type: string
    type: object
  logic.CloudQueryReq:
    properties:
      account_id:
        type: integer
      keyword:
        type: string
      provider:
        type: string
      region:
        type: string
      zone:
        description: 可选，可用区
        type: string
    type: object
  logic.CreateInventoryReq:
    properties:
      hosts_json:
        description: 主机配置 JSON 字符串
        type: string
      name:
        description: 清单名称，不能为空
        type: string
    type: object
  logic.CreateJobReq:
    properties:
      command:
        description: 要执行的命令
        type: string
      cron:
        description: Cron 调度表达式
        type: string
      description:
        description: 任务描述
        type: string
      host_ids:
        description: 目标主机 ID 列表
        type: string
      name:
        description: 任务名称 (必填)
        type: string
      priority:
        description: 任务优先级
        type: integer
      timeout:
        description: 执行超时时间 (秒)
        type: integer
      type:
        description: 任务类型 (shell/script)
        type: string
    required:
    - name
    type: object
  logic.CreatePlaybookReq:
    properties:
      content_yml:
        description: YAML 格式的 Playbook 内容
        type: string
      name:
        description: Playbook 名称，不能为空
        type: string
      risk_level:
        description: 风险等级（low/medium/high），默认 medium
        type: string
    type: object
  logic.CreateReq:
    properties:
      auth_type:
        description: 认证类型
        type: string
      cluster_id:
        description: 集群 ID
        type: integer
      description:
        description: 描述
        type: string
      force:
        description: 强制创建（忽略探测失败）
        type: boolean
      ip:
        description: IP 地址
        type: string
      labels:
        description: 标签列表
        items:
          type: string
        type: array
      name:
        description: 主机名称
        type: string
      parent_host_id:
        description: 父主机 ID（虚拟化场景）
        type: integer
      password:
        description: SSH 密码
        type: string
      port:
        description: SSH 端口
        type: integer
      probe_token:
        description: 探测令牌
        type: string
      provider:
        description: 云厂商
        type: string
      provider_instance_id:
        description: 云实例 ID
        type: string
      role:
        description: 角色
        type: string
      source:
        description: 来源
        type: string
      ssh_key_id:
        description: SSH 密钥 ID
        type: integer
      status:
        description: 初始状态
        type: string
      username:
        description: SSH 用户名
        type: string
    type: object
  logic.ExecuteRunReq:
    properties:
      action:
        description: 执行动作类型
        type: string
      approval_token:
        description: 审批令牌，由预览接口生成
        type: string
      params:
        additionalProperties: {}
        description: 执行参数
        type: object
    type: object
  logic.KVMPreviewReq:
    properties:
      cpu:
        description: CPU 核心数
        type: integer
      disk_gb:
        description: 磁盘大小（GB）
        type: integer
      memory_mb:
        description: 内存大小（MB）
        type: integer
      name:
        description: 虚拟机名称
        type: string
      network_bridge:
        description: 网络桥接名称
        type: string
      template:
        description: 模板名称
        type: string
    type: object
  logic.KVMProvisionReq:
    properties:
      cpu:
        description: CPU 核心数
        type: integer
      disk_gb:
        description: 磁盘大小（GB）
        type: integer
      ip:
        description: IP 地址
        type: string
      memory_mb:
        description: 内存大小（MB）
        type: integer
      name:
        description: 虚拟机名称
        type: string
      network_bridge:
        description: 网络桥接名称
        type: string
      password:
        description: SSH 密码
        type: string
      ssh_key_id:
        description: SSH 密钥 ID
        type: integer
      ssh_user:
        description: SSH 用户名
        type: string
      template:
        description: 模板名称
        type: string
    type: object
  logic.LLMProviderCreateRequest:
    properties:
      api_key:
        type: string
      base_url:
        type: string
      is_default:
        type: boolean
      is_enabled:
        type: boolean
      model:
        type: string
      name:
        type: string
      provider:
        type: string
      sort_order:
        type: integer
      temperature:
        type: number
      thinking:
        type: boolean
    required:
    - api_key
    - base_url
    - model
    - name
    - provider
    type: object
  logic.LLMProviderImportRequest:
    properties:
      providers:
        items:
          $ref: '#/definitions/logic.LLMProviderCreateRequest'
        type: array
      replace_all:
        type: boolean
