info:
  contact: {}
paths:
  /admin/ai/models:
    get:
      consumes:
      - application/json
      description: 获取所有配置的 LLM 模型列表
      parameters:
      - description: Bearer Token
        in: header
        name: Authorization
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/httpx.Response'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/httpx.Response'
      summary: 列出 LLM 模型
      tags:
      - AI 模型管理
    post:
      consumes:
      - application/json
      description: 创建新的 LLM 模型配置
      parameters:
      - description: Bearer Token
        in: header
        name: Authorization
        required: true
        type: string
      - description: 创建模型请求
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/logic.LLMProviderCreateRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/httpx.Response'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/httpx.Response'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/httpx.Response'
      summary: 创建 LLM 模型
      tags:
      - AI 模型管理
  /admin/ai/models/{id}:
    delete:
      consumes:
      - application/json
      description: 删除指定 ID 的 LLM 模型
      parameters:
      - description: Bearer Token
        in: header
        name: Authorization
        required: true
        type: string
      - description: 模型 ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/httpx.Response'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/httpx.Response'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/httpx.Response'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/httpx.Response'
      summary: 删除 LLM 模型
      tags:
      - AI 模型管理
    get:
      consumes:
      - application/json
      description: 获取指定 ID 的 LLM 模型详情
      parameters:
      - description: Bearer Token
        in: header
        name: Authorization
        required: true
        type: string
      - description: 模型 ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/httpx.Response'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/httpx.Response'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/httpx.Response'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/httpx.Response'
      summary: 获取 LLM 模型
      tags:
      - AI 模型管理
    put:
      consumes:
      - application/json
      description: 更新指定 ID 的 LLM 模型配置
      parameters:
      - description: Bearer Token
        in: header
        name: Authorization
        required: true
        type: string
      - description: 模型 ID
        in: path
        name: id
        required: true
        type: integer
      - description: 更新模型请求
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/logic.LLMProviderUpdateRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/httpx.Response'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/httpx.Response'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/httpx.Response'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/httpx.Response'
      summary: 更新 LLM 模型
      tags:
      - AI 模型管理
  /admin/ai/models/{id}/default:
    put:
      consumes:
      - application/json
      description: 将指定模型设置为默认模型
      parameters:
      - description: Bearer Token
