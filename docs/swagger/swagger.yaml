  logic.LLMProviderUpdateRequest:
    properties:
      api_key:
        type: string
      base_url:
        type: string
      is_default:
        type: boolean
      is_enabled:
        type: boolean
      model:
        type: string
      name:
        type: string
      provider:
        type: string
      sort_order:
        type: integer
      temperature:
        type: number
      thinking:
        type: boolean
    type: object
  logic.PreviewRunReq:
    properties:
      action:
        description: 执行动作类型
        type: string
      params:
        additionalProperties: {}
        description: 执行参数
        type: object
    type: object
  logic.ProbeReq:
    properties:
      auth_type:
        description: 认证类型 (password/key)
        type: string
      ip:
        description: 主机 IP 地址
        type: string
      name:
        description: 主机名称
        type: string
      password:
        description: SSH 密码
        type: string
      port:
        description: SSH 端口
        type: integer
      ssh_key_id:
        description: SSH 密钥 ID
        type: integer
      username:
        description: SSH 用户名
        type: string
    type: object
  logic.ReleaseDecisionReq:
    properties:
      comment:
        type: string
    type: object
  logic.RollbackReleaseReq:
    properties:
      comment:
        type: string
      target_version:
        type: string
    required:
    - target_version
    type: object
  logic.SSHKeyCreateReq:
    properties:
      name:
        description: 密钥名称
        type: string
      passphrase:
        description: 私钥密码（可选）
